<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YOLO Livestock Detection</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f5;
      color: #1f2933;
    }
    header {
      padding: 20px 28px;
      background: #17324d;
      color: white;
    }
    header h1 { margin: 0 0 5px; font-size: 24px; }
    header p { margin: 0; color: #d8e5ef; }
    main {
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 20px;
      padding: 20px;
      min-height: calc(100vh - 91px);
    }
    .panel {
      background: white;
      border: 1px solid #d6dde3;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.06);
    }
    h2 { margin: 0 0 16px; font-size: 18px; }
    label { display: block; margin: 13px 0 5px; font-weight: 600; }
    select, input, button {
      width: 100%;
      padding: 10px;
      border: 1px solid #aeb9c2;
      border-radius: 5px;
      font: inherit;
    }
    button {
      margin-top: 14px;
      background: #1769aa;
      border-color: #1769aa;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { background: #9aa7b2; border-color: #9aa7b2; cursor: default; }
    .file-list {
      margin-top: 12px;
      max-height: 150px;
      overflow-y: auto;
      padding: 8px;
      background: #f6f8fa;
      border-radius: 5px;
      font-size: 13px;
    }
    .file-list div { padding: 4px; overflow-wrap: anywhere; }
    .workspace { display: grid; grid-template-rows: 1fr auto auto; gap: 16px; }
    .viewer {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #20262c;
      border-radius: 7px;
      overflow: hidden;
      position: relative;
    }
    .viewer img { max-width: 100%; max-height: 65vh; display: none; }
    .placeholder { color: #c8d0d7; }
    .controls { display: none; gap: 10px; align-items: center; margin-top: 12px; }
    .controls button { width: auto; margin: 0; padding: 7px 14px; }
    .metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .metric { background: #f6f8fa; border-radius: 5px; padding: 12px; text-align: center; }
    .metric strong { display: block; font-size: 20px; margin-top: 4px; }
    .log {
      max-height: 130px;
      overflow-y: auto;
      margin: 0;
      padding: 12px;
      background: #15202b;
      color: #d9e2e8;
      border-radius: 5px;
      font: 13px monospace;
      white-space: pre-wrap;
    }
    .error { color: #ff9f9f; }
    @media (max-width: 850px) {
      main { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <h1>YOLO Livestock Detection</h1>
    <p>Upload livestock images, choose a model and run predictions.</p>
  </header>
  <main>
    <section class="panel">
      <h2>Prediction settings</h2>
      <label for="model">Model</label>
      <select id="model">
        {% for filename, label in models.items() %}
        <option value="{{ filename }}">{{ label }}</option>
        {% endfor %}
      </select>

      <label for="confidence">Confidence</label>
      <input id="confidence" type="number" min="0" max="1" step="0.05" value="0.25">

      <label for="iou">IoU</label>
      <input id="iou" type="number" min="0" max="1" step="0.05" value="0.70">

      <label for="files">Images</label>
      <input id="files" type="file" accept="image/jpeg,image/png" multiple>
      <div id="fileList" class="file-list">No images uploaded</div>
      <button id="predict" disabled>Run prediction</button>
    </section>

    <section class="workspace">
      <div class="panel">
        <h2>Prediction results</h2>
        <div class="viewer">
          <span id="placeholder" class="placeholder">Results will appear here</span>
          <img id="resultImage" alt="Prediction result">
        </div>
        <div id="controls" class="controls">
          <button id="previous">Previous</button>
          <span id="counter"></span>
          <button id="next">Next</button>
        </div>
      </div>

      <div id="metrics" class="metrics"></div>
      <pre id="log" class="log">Ready</pre>
    </section>
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
